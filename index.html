<!DOCTYPE html>
<html lang="it">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0" />

  <title>RoomSense Tactical AI</title>

  <link rel="stylesheet"
        href="style.css" />

</head>

<body>

  <header class="topbar">

    <div class="logoArea">

      <div class="logoIcon">
        📡
      </div>

      <div>

        <h1>RoomSense Tactical AI</h1>

        <p>
          Tactical Live Tracking System
        </p>

      </div>

    </div>

    <button id="installBtn"
            class="installBtn">

      INSTALLA

    </button>

  </header>

  <main class="mainContainer">

    <section class="dashboard">

      <div class="card">

        <h3>PERSONE</h3>

        <span id="peopleCount">
          3
        </span>

      </div>

      <div class="card">

        <h3>TRACKING</h3>

        <span id="roomCount">
          LIVE
        </span>

      </div>

      <div class="card">

        <h3>SISTEMA AI</h3>

        <span class="online">
          ONLINE
        </span>

      </div>

    </section>

    <section class="mapPanel">

      <div class="mapHeader">

        <h2>
          LIVE TACTICAL OVERLAY
        </h2>

        <p>
          Tracking persone realtime
        </p>

      </div>

      <div class="planWrapper">

        <img src="planimetria.jpg"
             class="planImage"
             alt="Planimetria casa" />

        <!-- PUNTI STANZE -->

        <div class="roomPoint"
             style="left:10%; top:53%;">
          <span>BAGNO 1</span>
        </div>

        <div class="roomPoint"
             style="left:12%; top:74%;">
          <span>CAMERA 1</span>
        </div>

        <div class="roomPoint"
             style="left:31%; top:74%;">
          <span>CAMERA 2</span>
        </div>

        <div class="roomPoint"
             style="left:36%; top:57%;">
          <span>CORRIDOIO</span>
        </div>

        <div class="roomPoint"
             style="left:47%; top:72%;">
          <span>BAGNO 2</span>
        </div>

        <div class="roomPoint"
             style="left:54%; top:49%;">
          <span>INGRESSO</span>
        </div>

        <div class="roomPoint"
             style="left:63%; top:39%;">
          <span>STUDIO</span>
        </div>

        <div class="roomPoint"
             style="left:85%; top:41%;">
          <span>CAMERA 3</span>
        </div>

        <div class="roomPoint"
             style="left:58%; top:76%;">
          <span>CUCINA</span>
        </div>

        <div class="roomPoint"
             style="left:76%; top:71%;">
          <span>SOGGIORNO</span>
        </div>

        <!-- AVATAR LIVE -->

        <div class="avatar marco"
             id="avatar-marco">

          <div class="avatarDot"></div>

          <div class="avatarLabel">
            Marco
          </div>

        </div>

        <div class="avatar serena"
             id="avatar-serena">

          <div class="avatarDot"></div>

          <div class="avatarLabel">
            Serena
          </div>

        </div>

        <div class="avatar damiano"
             id="avatar-damiano">

          <div class="avatarDot"></div>

          <div class="avatarLabel">
            Damiano
          </div>

        </div>

        <div class="avatar cinzia"
             id="avatar-cinzia">

          <div class="avatarDot"></div>

          <div class="avatarLabel">
            Cinzia
          </div>

         </div>

        <!-- LINEA RADAR -->

        <div class="scanLine"></div>

      </div>

    </section>

    <section class="controls">

      <button onclick="toggleMovement()">
        ATTIVA / FERMA TRACKING
      </button>

    </section>

    <section class="logBox">

      <h2>
        LOG LIVE TRACKING
      </h2>

      <div id="logContainer"></div>

    </section>

  </main>

  <script src="script.js"></script>

</body>

</html>
