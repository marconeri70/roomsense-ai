<!DOCTYPE html>
<html lang="it">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0" />

  <title>RoomSense Tactical AI</title>

  <link rel="stylesheet"
        href="style.css" />

  <link rel="manifest"
        href="manifest.webmanifest" />

  <meta name="theme-color"
        content="#020617" />

</head>

<body>

  <header class="topbar">

    <div class="logoArea">

      <div class="logoIcon">
        📡
      </div>

      <div>

        <h1>RoomSense Tactical AI</h1>

        <p>
          Overlay Tactical Smart Home
        </p>

      </div>

    </div>

    <button id="installBtn"
            class="installBtn">

      INSTALLA

    </button>

  </header>

  <main class="mainContainer">

    <section class="dashboard">

      <div class="card">

        <h3>PERSONE</h3>

        <span id="peopleCount">
          0
        </span>

      </div>

      <div class="card">

        <h3>STANZE ATTIVE</h3>

        <span id="roomCount">
          0
        </span>

      </div>

      <div class="card">

        <h3>SISTEMA AI</h3>

        <span class="online">
          ONLINE
        </span>

      </div>

    </section>

    <section class="mapPanel">

      <div class="mapHeader">

        <h2>
          MAPPA TACTICAL CASA
        </h2>

        <p>
          Scanner presenza su planimetria reale
        </p>

      </div>

      <div class="planWrapper">

        <img src="planimetria.jpg"
             class="planImage"
             alt="Planimetria casa" />

        <!-- BAGNO 1 -->

        <div class="roomPoint"
             id="point-bagno1"
             style="left:10%; top:53%;"
             onclick="detectPerson('Marco','bagno1')">

          <span>
            BAGNO 1
          </span>

        </div>

        <!-- CAMERA 1 -->

        <div class="roomPoint"
             id="point-camera1"
             style="left:12%; top:74%;"
             onclick="detectPerson('Serena','camera1')">

          <span>
            CAMERA 1
          </span>

        </div>

        <!-- CAMERA 2 -->

        <div class="roomPoint"
             id="point-camera2"
             style="left:31%; top:74%;"
             onclick="detectPerson('Damiano','camera2')">

          <span>
            CAMERA 2
          </span>

        </div>

        <!-- CORRIDOIO -->

        <div class="roomPoint"
             id="point-corridoio"
             style="left:36%; top:57%;"
             onclick="detectPerson('Marco','corridoio')">

          <span>
            CORRIDOIO
          </span>

        </div>

        <!-- BAGNO 2 -->

        <div class="roomPoint"
             id="point-bagno2"
             style="left:50%; top:74%;"
             onclick="detectPerson('Serena','bagno2')">

          <span>
            BAGNO 2
          </span>

        </div>

        <!-- INGRESSO -->

        <div class="roomPoint"
             id="point-ingresso"
             style="left:57%; top:49%;"
             onclick="detectPerson('Marco','ingresso')">

          <span>
            INGRESSO
          </span>

        </div>

        <!-- STUDIO -->

        <div class="roomPoint"
             id="point-studio"
             style="left:63%; top:39%;"
             onclick="detectPerson('Serena','studio')">

          <span>
            STUDIO
          </span>

        </div>

        <!-- CAMERA 3 -->

        <div class="roomPoint"
             id="point-camera3"
             style="left:85%; top:41%;"
             onclick="detectPerson('Marco','camera3')">

          <span>
            CAMERA 3
          </span>

        </div>

        <!-- CUCINA -->

        <div class="roomPoint"
             id="point-cucina"
             style="left:61%; top:78%;"
             onclick="detectPerson('Marco','cucina')">

          <span>
            CUCINA
          </span>

        </div>

        <!-- SOGGIORNO -->

        <div class="roomPoint"
             id="point-soggiorno"
             style="left:76%; top:71%;"
             onclick="detectPerson('Damiano','soggiorno')">

          <span>
            SOGGIORNO
          </span>

        </div>

        <!-- LINEA SCANNER -->

        <div class="scanLine"></div>

      </div>

    </section>

    <section class="controls">

      <button onclick="detectPerson('Marco','cucina')">
        Marco → Cucina
      </button>

      <button onclick="detectPerson('Serena','camera1')">
        Serena → Camera 1
      </button>

      <button onclick="detectPerson('Damiano','soggiorno')">
        Damiano → Soggiorno
      </button>

      <button onclick="detectPerson('Marco','studio')">
        Marco → Studio
      </button>

      <button onclick="detectPerson('Serena','camera3')">
        Serena → Camera 3
      </button>

      <button onclick="resetSystem()">
        RESET SISTEMA
      </button>

    </section>

    <section class="logBox">

      <h2>
        LOG TACTICAL AI
      </h2>

      <div id="logContainer">

      </div>

    </section>

  </main>

  <script src="script.js"></script>

</body>

</html>
