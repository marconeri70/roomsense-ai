<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>RoomSense AI</title>

  <link rel="stylesheet"
        href="style.css">

  <link rel="manifest"
        href="manifest.webmanifest">

  <meta name="theme-color"
        content="#020617">
</head>

<body>

  <header class="topbar">

    <div class="logoBox">

      <div class="logoIcon">
        📡
      </div>

      <div>
        <h1>RoomSense AI</h1>
        <p>
          Mappa casa intelligente
        </p>
      </div>

    </div>

    <button class="installBtn"
            id="installBtn">
      Installa
    </button>

  </header>

  <main class="mainContainer">

    <section class="dashboardGrid">

      <div class="infoCard">
        <h3>Persone rilevate</h3>

        <span id="peopleCount">
          0
        </span>
      </div>

      <div class="infoCard">
        <h3>Stanze attive</h3>

        <span id="roomCount">
          0
        </span>
      </div>

      <div class="infoCard">
        <h3>AI Status</h3>

        <span class="onlineText">
          ONLINE
        </span>
      </div>

    </section>

    <section class="houseWrapper">

      <div class="houseMap">

        <div class="room"
             id="cucina">

          <div class="roomTitle">
            🍳 Cucina
          </div>

          <div class="roomStatus"
               id="status-cucina">

            Nessuno rilevato

          </div>

          <div class="radar"></div>

        </div>

        <div class="room"
             id="salone">

          <div class="roomTitle">
            🛋️ Salone
          </div>

          <div class="roomStatus"
               id="status-salone">

            Nessuno rilevato

          </div>

          <div class="radar"></div>

        </div>

        <div class="room"
             id="camera">

          <div class="roomTitle">
            🛏️ Camera
          </div>

          <div class="roomStatus"
               id="status-camera">

            Nessuno rilevato

          </div>

          <div class="radar"></div>

        </div>

        <div class="room"
             id="garage">

          <div class="roomTitle">
            🚗 Garage
          </div>

          <div class="roomStatus"
               id="status-garage">

            Nessuno rilevato

          </div>

          <div class="radar"></div>

        </div>

      </div>

    </section>

    <section class="controls">

      <button onclick="detectPerson('Marco','cucina')">
        Marco → Cucina
      </button>

      <button onclick="detectPerson('Serena','camera')">
        Serena → Camera
      </button>

      <button onclick="detectPerson('Damiano','salone')">
        Damiano → Salone
      </button>

      <button onclick="detectPerson('Marco','garage')">
        Marco → Garage
      </button>

      <button onclick="resetRooms()">
        Reset
      </button>

    </section>

    <section class="activityBox">

      <h2>
        Log AI
      </h2>

      <div id="activityLog">

      </div>

    </section>

  </main>

  <script src="script.js"></script>

</body>

</html>
